<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>teavm-react Kitchen Sink</title>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 960px;
            margin: 0 auto;
            padding: 20px;
            background: #fafafa;
            color: #333;
            line-height: 1.6;
        }
        h1 { border-bottom: 3px solid #0066cc; padding-bottom: 12px; color: #0066cc; }
        h2 { color: #0066cc; margin-top: 24px; }
        h3 { color: #444; margin-top: 20px; border-left: 4px solid #0066cc; padding-left: 10px; }
        h4 { color: #555; }
        section {
            background: white;
            border-radius: 8px;
            padding: 20px 24px;
            margin: 16px 0;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
        }
        button {
            background: #0066cc;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            margin: 4px;
            font-size: 14px;
            transition: background 0.2s;
        }
        button:hover { background: #0052a3; }
        button:disabled { background: #999; cursor: not-allowed; }
        button.btn-success { background: #28a745; }
        button.btn-success:hover { background: #218838; }
        button.btn-warning { background: #ffc107; color: #333; }
        button.btn-warning:hover { background: #e0a800; }
        button.btn-danger { background: #dc3545; font-size: 12px; padding: 2px 8px; }
        button.btn-danger:hover { background: #c82333; }
        button.btn-sm { font-size: 12px; padding: 2px 8px; }
        button.theme-toggle { background: #6c757d; }
        button.theme-toggle:hover { background: #5a6268; }
        input[type="text"], input[type="email"], input[type="password"] {
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            width: 300px;
            margin: 4px 0;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus, textarea:focus {
            border-color: #0066cc;
            outline: none;
            box-shadow: 0 0 0 2px rgba(0,102,204,0.2);
        }
        textarea {
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            width: 100%;
            max-width: 500px;
            resize: vertical;
        }
        hr { border: none; border-top: 1px solid #e0e0e0; margin: 24px 0; }
        ul, ol { padding-left: 24px; }
        li { padding: 4px 0; }
        table { border-collapse: collapse; width: 100%; margin: 12px 0; }
        th, td { border: 1px solid #ddd; padding: 10px 14px; text-align: left; }
        th { background: #f0f0f0; font-weight: 600; }
        tr:nth-child(even) td { background: #fafafa; }
        blockquote {
            border-left: 4px solid #0066cc;
            margin: 12px 0;
            padding: 8px 16px;
            background: #f8f9fa;
            color: #555;
            font-style: italic;
        }
        pre {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 16px;
            border-radius: 6px;
            overflow-x: auto;
            font-size: 13px;
        }
        code { background: #f0f0f0; padding: 2px 6px; border-radius: 3px; font-size: 13px; }
        mark { background: #fff3cd; padding: 2px 4px; }
        dl { margin: 8px 0; }
        dt { font-weight: 600; margin-top: 8px; }
        dd { margin-left: 20px; color: #555; }
        details {
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 8px 12px;
            margin: 8px 0;
        }
        details summary { cursor: pointer; font-weight: 600; }
        details[open] summary { margin-bottom: 8px; }
        nav { margin: 12px 0; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 4px; }
        footer { text-align: center; color: #888; margin-top: 40px; }
    </style>
</head>
<body>
    <div id="root">
        <p>Loading teavm-react kitchen sink demo...</p>
    </div>

    <script src="js/classes.js"></script>
    <script>
        if (typeof main === 'function') {
            main([]);
        } else {
            console.error('teavm-react: main() not found.');
        }
    </script>
</body>
</html>
